<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Резиденция, Жуковка — поэтажный план">
  <style>
    text { font-family: ui-monospace, 'JetBrains Mono', Menlo, monospace; }
    .room { font-size: 9px; fill: #0A0A0A; letter-spacing: 0.08em; }
    .meta { font-size: 9px; fill: #0A0A0A; letter-spacing: 0.06em; }
    .wall { stroke: #0A0A0A; stroke-width: 1.5; fill: none; }
    .inner { stroke: #0A0A0A; stroke-width: 0.8; fill: none; }
    .furn { stroke: #0A0A0A; stroke-width: 0.5; fill: none; }
    .ghost { stroke: #BBBBBB; stroke-width: 0.5; fill: none; stroke-dasharray: 3 3; }
    .water { stroke: #6B6B6B; stroke-width: 0.5; fill: none; }
  </style>
  <rect width="800" height="600" fill="#FFFFFF"/>

  <!-- Site outline (ghost) — 60 соток plot suggestion -->
  <rect x="20" y="40" width="760" height="490" class="ghost"/>

  <!-- Main house — long L-shape -->
  <line x1="80" y1="180" x2="540" y2="180" class="wall"/>
  <line x1="540" y1="180" x2="540" y2="280" class="wall"/>
  <line x1="540" y1="280" x2="700" y2="280" class="wall"/>
  <!-- Pool wing under same roof -->
  <line x1="700" y1="280" x2="700" y2="400" class="wall"/>
  <line x1="700" y1="400" x2="540" y2="400" class="wall"/>
  <line x1="540" y1="400" x2="540" y2="380" class="wall"/>
  <line x1="540" y1="380" x2="80" y2="380" class="wall"/>
  <line x1="80" y1="380" x2="80" y2="180" class="wall"/>

  <!-- Inner walls of main house -->
  <line x1="180" y1="180" x2="180" y2="380" class="inner"/>
  <line x1="280" y1="180" x2="280" y2="380" class="inner"/>
  <line x1="380" y1="180" x2="380" y2="380" class="inner"/>
  <line x1="180" y1="280" x2="540" y2="280" class="inner"/>

  <!-- Sub-divisions in service strip -->
  <line x1="220" y1="180" x2="220" y2="280" class="inner"/>
  <line x1="320" y1="280" x2="320" y2="380" class="inner"/>
  <line x1="450" y1="280" x2="450" y2="380" class="inner"/>

  <!-- Pool inside the wing — drawn as rectangle with water lines -->
  <rect x="560" y="300" width="120" height="80" class="inner"/>
  <line x1="570" y1="320" x2="670" y2="320" class="water"/>
  <line x1="570" y1="340" x2="670" y2="340" class="water"/>
  <line x1="570" y1="360" x2="670" y2="360" class="water"/>

  <!-- Detached sauna at angle (rotated) -->
  <g transform="translate(250, 480) rotate(-25)">
    <rect x="-50" y="-30" width="100" height="60" class="wall"/>
    <line x1="-20" y1="-30" x2="-20" y2="30" class="inner"/>
    <line x1="20" y1="-30" x2="20" y2="30" class="inner"/>
    <text x="-35" y="6" class="meta" text-anchor="middle">ПАР.</text>
    <text x="0" y="6" class="meta" text-anchor="middle">МЫТЬЁ</text>
    <text x="35" y="6" class="meta" text-anchor="middle">ОТД.</text>
    <text x="0" y="-40" class="room" text-anchor="middle">БАНЯ</text>
  </g>

  <!-- Connection path from house to sauna -->
  <line x1="200" y1="380" x2="240" y2="450" class="ghost"/>

  <!-- Trees (forest edge north) -->
  <circle cx="60" cy="120" r="14" class="ghost"/>
  <circle cx="160" cy="100" r="12" class="ghost"/>
  <circle cx="280" cy="110" r="14" class="ghost"/>
  <circle cx="400" cy="100" r="12" class="ghost"/>
  <circle cx="520" cy="110" r="14" class="ghost"/>
  <circle cx="640" cy="120" r="12" class="ghost"/>
  <circle cx="740" cy="100" r="14" class="ghost"/>

  <!-- Doors -->
  <line x1="150" y1="380" x2="180" y2="380" stroke="#FFFFFF" stroke-width="2.5"/>
  <line x1="540" y1="320" x2="540" y2="350" stroke="#FFFFFF" stroke-width="2.5"/>

  <!-- Furniture suggestions -->
  <rect x="100" y="220" width="60" height="30" class="furn"/>
  <rect x="100" y="320" width="60" height="40" class="furn"/>
  <rect x="200" y="320" width="60" height="40" class="furn"/>
  <ellipse cx="430" cy="240" rx="50" ry="25" class="furn"/>

  <!-- Room labels -->
  <text x="130" y="240" class="room" text-anchor="middle">МАСТЕР</text>
  <text x="200" y="230" class="room" text-anchor="middle">ВАН.</text>
  <text x="200" y="345" class="room" text-anchor="middle">ДЕТСКАЯ 01</text>
  <text x="130" y="345" class="room" text-anchor="middle">ДЕТСКАЯ 02</text>
  <text x="330" y="345" class="room" text-anchor="middle">ДЕТСКАЯ 03</text>
  <text x="330" y="240" class="room" text-anchor="middle">КАБИНЕТ</text>
  <text x="430" y="200" class="room" text-anchor="middle">СТОЛОВАЯ — ГОСТИНАЯ</text>
  <text x="430" y="345" class="room" text-anchor="middle">КУХНЯ</text>
  <text x="495" y="345" class="room" text-anchor="middle">КЛАД.</text>
  <text x="620" y="395" class="room" text-anchor="middle">БАССЕЙН</text>

  <!-- Property direction arrow (lake/forest hint) -->
  <text x="40" y="80" class="meta">↑ Лес</text>
  <text x="760" y="80" class="meta" text-anchor="end">↗ Озеро</text>

  <!-- North arrow -->
  <g transform="translate(745, 50)">
    <line x1="0" y1="0" x2="0" y2="-26" class="wall"/>
    <polygon points="0,-26 -3,-18 3,-18" fill="#0A0A0A"/>
    <text x="0" y="14" class="meta" text-anchor="middle">N</text>
  </g>

  <!-- Scale bar -->
  <g transform="translate(60, 555)">
    <line x1="0" y1="0" x2="100" y2="0" class="wall"/>
    <line x1="0" y1="-3" x2="0" y2="3" class="wall"/>
    <line x1="40" y1="-3" x2="40" y2="3" class="wall"/>
    <line x1="100" y1="-3" x2="100" y2="3" class="wall"/>
    <text x="0" y="14" class="meta">0</text>
    <text x="40" y="14" class="meta">5</text>
    <text x="96" y="14" class="meta">10 M</text>
  </g>

  <!-- Title block -->
  <g transform="translate(500, 540)">
    <text x="0" y="0" class="meta">05 / РЕЗИДЕНЦИЯ, ЖУКОВКА</text>
    <text x="0" y="14" class="meta">ГЕНПЛАН · 1:300 · УРОВЕНЬ 1</text>
    <text x="0" y="28" class="meta">720 m² · 2022 · STUDIO KUZNETSOV</text>
  </g>
</svg>
