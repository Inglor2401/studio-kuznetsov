<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Дом, Барвиха — поэтажный план">
  <style>
    text { font-family: ui-monospace, 'JetBrains Mono', Menlo, monospace; }
    .room { font-size: 10px; fill: #0A0A0A; letter-spacing: 0.08em; }
    .meta { font-size: 9px; fill: #0A0A0A; letter-spacing: 0.06em; }
    .wall { stroke: #0A0A0A; stroke-width: 1.5; fill: none; }
    .inner { stroke: #0A0A0A; stroke-width: 0.8; fill: none; }
    .furn { stroke: #0A0A0A; stroke-width: 0.5; fill: none; }
    .ghost { stroke: #BBBBBB; stroke-width: 0.5; fill: none; stroke-dasharray: 3 3; }
  </style>
  <rect width="800" height="600" fill="#FFFFFF"/>

  <!-- Hillside contour lines (ghost) — slope from north (top) to south -->
  <path d="M 30 110 Q 400 90 770 130" class="ghost"/>
  <path d="M 30 80 Q 400 60 770 100" class="ghost"/>

  <!-- Square footprint with conservatory on south -->
  <line x1="120" y1="130" x2="680" y2="130" class="wall"/>
  <line x1="680" y1="130" x2="680" y2="430" class="wall"/>
  <line x1="680" y1="430" x2="540" y2="430" class="wall"/>
  <!-- Conservatory bump-out on south -->
  <line x1="540" y1="430" x2="540" y2="490" class="wall"/>
  <line x1="540" y1="490" x2="260" y2="490" class="wall"/>
  <line x1="260" y1="490" x2="260" y2="430" class="wall"/>
  <line x1="260" y1="430" x2="120" y2="430" class="wall"/>
  <line x1="120" y1="430" x2="120" y2="130" class="wall"/>

  <!-- Conservatory glass walls (thin double line) -->
  <line x1="262" y1="432" x2="262" y2="488" class="inner"/>
  <line x1="538" y1="432" x2="538" y2="488" class="inner"/>
  <line x1="262" y1="488" x2="538" y2="488" class="inner"/>
  <line x1="266" y1="436" x2="266" y2="486" class="inner"/>
  <line x1="534" y1="436" x2="534" y2="486" class="inner"/>
  <line x1="266" y1="486" x2="534" y2="486" class="inner"/>

  <!-- Central living room boundary (open, no walls) -->
  <!-- Suggested by a light dotted outline -->
  <rect x="240" y="200" width="320" height="220" class="ghost"/>

  <!-- Central fireplace (free-standing, in middle) -->
  <rect x="380" y="290" width="40" height="40" fill="#0A0A0A"/>
  <circle cx="400" cy="280" r="2" fill="#0A0A0A"/>
  <line x1="400" y1="290" x2="400" y2="270" class="furn"/>

  <!-- Bedroom wing (north strip) -->
  <line x1="120" y1="210" x2="240" y2="210" class="inner"/>
  <line x1="240" y1="130" x2="240" y2="210" class="inner"/>
  <line x1="180" y1="130" x2="180" y2="210" class="inner"/>

  <!-- Service wing (east) -->
  <line x1="560" y1="130" x2="560" y2="430" class="inner"/>
  <line x1="560" y1="220" x2="680" y2="220" class="inner"/>
  <line x1="560" y1="320" x2="680" y2="320" class="inner"/>

  <!-- Master suite (west) -->
  <line x1="120" y1="320" x2="240" y2="320" class="inner"/>
  <line x1="240" y1="210" x2="240" y2="430" class="inner"/>
  <line x1="190" y1="320" x2="190" y2="430" class="inner"/>

  <!-- Doors -->
  <line x1="240" y1="160" x2="240" y2="200" stroke="#FFFFFF" stroke-width="2.5"/>
  <line x1="380" y1="430" x2="420" y2="430" stroke="#FFFFFF" stroke-width="2.5"/>
  <line x1="560" y1="280" x2="560" y2="310" stroke="#FFFFFF" stroke-width="2.5"/>
  <line x1="240" y1="370" x2="240" y2="400" stroke="#FFFFFF" stroke-width="2.5"/>

  <!-- Furniture: dining table by conservatory -->
  <ellipse cx="400" cy="400" rx="50" ry="20" class="furn"/>
  <!-- Living seating around fireplace -->
  <rect x="280" y="240" width="80" height="30" class="furn"/>
  <rect x="440" y="340" width="80" height="30" class="furn"/>
  <!-- Master bed -->
  <rect x="270" y="350" width="60" height="40" class="furn"/>
  <!-- Children beds -->
  <rect x="135" y="150" width="40" height="50" class="furn"/>
  <rect x="195" y="150" width="40" height="50" class="furn"/>

  <!-- Trees outside (south) -->
  <circle cx="100" cy="510" r="14" class="ghost"/>
  <circle cx="700" cy="510" r="14" class="ghost"/>
  <circle cx="80" cy="540" r="10" class="ghost"/>
  <circle cx="720" cy="540" r="12" class="ghost"/>

  <!-- Room labels -->
  <text x="155" y="180" class="room" text-anchor="middle">ДЕТСКАЯ 01</text>
  <text x="215" y="180" class="room" text-anchor="middle">ДЕТСКАЯ 02</text>
  <text x="350" y="180" class="room" text-anchor="middle">ВЕСТИБЮЛЬ</text>
  <text x="620" y="180" class="room" text-anchor="middle">ХОЗБЛОК</text>
  <text x="620" y="280" class="room" text-anchor="middle">КУХНЯ</text>
  <text x="620" y="380" class="room" text-anchor="middle">КЛАДОВАЯ</text>
  <text x="180" y="280" class="room" text-anchor="middle">ВАННАЯ</text>
  <text x="155" y="395" class="room" text-anchor="middle">ГАРД.</text>
  <text x="220" y="395" class="room" text-anchor="middle">МАСТЕР</text>
  <text x="400" y="240" class="room" text-anchor="middle">ОБЩАЯ ЗОНА — 60 m²</text>
  <text x="400" y="475" class="room" text-anchor="middle">ЗИМНИЙ САД</text>

  <!-- North arrow -->
  <g transform="translate(745, 70)">
    <line x1="0" y1="0" x2="0" y2="-26" class="wall"/>
    <polygon points="0,-26 -3,-18 3,-18" fill="#0A0A0A"/>
    <text x="0" y="14" class="meta" text-anchor="middle">N</text>
  </g>

  <!-- Scale bar -->
  <g transform="translate(60, 555)">
    <line x1="0" y1="0" x2="80" y2="0" class="wall"/>
    <line x1="0" y1="-3" x2="0" y2="3" class="wall"/>
    <line x1="32" y1="-3" x2="32" y2="3" class="wall"/>
    <line x1="80" y1="-3" x2="80" y2="3" class="wall"/>
    <text x="0" y="14" class="meta">0</text>
    <text x="32" y="14" class="meta">2</text>
    <text x="76" y="14" class="meta">5 M</text>
  </g>

  <!-- Title block -->
  <g transform="translate(500, 540)">
    <text x="0" y="0" class="meta">03 / ДОМ, БАРВИХА</text>
    <text x="0" y="14" class="meta">ПЛАН · 1:200 · УРОВЕНЬ 1</text>
    <text x="0" y="28" class="meta">580 m² · 2024 · STUDIO KUZNETSOV</text>
  </g>
</svg>
