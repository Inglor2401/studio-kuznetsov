<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Квартира, Остоженка — поэтажный план">
  <style>
    text { font-family: ui-monospace, 'JetBrains Mono', Menlo, monospace; }
    .room { font-size: 10px; fill: #0A0A0A; letter-spacing: 0.08em; }
    .meta { font-size: 9px; fill: #0A0A0A; letter-spacing: 0.06em; }
    .wall { stroke: #0A0A0A; stroke-width: 1.5; fill: none; }
    .inner { stroke: #0A0A0A; stroke-width: 0.8; fill: none; }
    .furn { stroke: #0A0A0A; stroke-width: 0.5; fill: none; }
  </style>
  <rect width="800" height="600" fill="#FFFFFF"/>

  <!-- Long horizontal footprint, 660x300, enfilade along north -->
  <!-- North facade with windows in each of 5 rooms -->
  <line x1="70" y1="160" x2="100" y2="160" class="wall"/>
  <line x1="100" y1="158" x2="180" y2="158" class="inner"/>
  <line x1="100" y1="162" x2="180" y2="162" class="inner"/>
  <line x1="180" y1="160" x2="220" y2="160" class="wall"/>
  <line x1="220" y1="158" x2="300" y2="158" class="inner"/>
  <line x1="220" y1="162" x2="300" y2="162" class="inner"/>
  <line x1="300" y1="160" x2="340" y2="160" class="wall"/>
  <line x1="340" y1="158" x2="420" y2="158" class="inner"/>
  <line x1="340" y1="162" x2="420" y2="162" class="inner"/>
  <line x1="420" y1="160" x2="460" y2="160" class="wall"/>
  <line x1="460" y1="158" x2="540" y2="158" class="inner"/>
  <line x1="460" y1="162" x2="540" y2="162" class="inner"/>
  <line x1="540" y1="160" x2="580" y2="160" class="wall"/>
  <line x1="580" y1="158" x2="660" y2="158" class="inner"/>
  <line x1="580" y1="162" x2="660" y2="162" class="inner"/>
  <line x1="660" y1="160" x2="730" y2="160" class="wall"/>
  <line x1="730" y1="160" x2="730" y2="450" class="wall"/>
  <line x1="730" y1="450" x2="70" y2="450" class="wall"/>
  <line x1="70" y1="450" x2="70" y2="160" class="wall"/>

  <!-- Enfilade — 5 reception rooms divided by inner walls with aligned doors -->
  <line x1="200" y1="160" x2="200" y2="320" class="inner"/>
  <line x1="332" y1="160" x2="332" y2="320" class="inner"/>
  <line x1="464" y1="160" x2="464" y2="320" class="inner"/>
  <line x1="596" y1="160" x2="596" y2="320" class="inner"/>

  <!-- Service zone south of enfilade -->
  <line x1="70" y1="320" x2="730" y2="320" class="inner"/>

  <!-- Aligned enfilade doors (centered, 36px wide) -->
  <line x1="180" y1="320" x2="220" y2="320" stroke="#FFFFFF" stroke-width="2.5"/>
  <line x1="312" y1="320" x2="352" y2="320" stroke="#FFFFFF" stroke-width="2.5"/>
  <line x1="444" y1="320" x2="484" y2="320" stroke="#FFFFFF" stroke-width="2.5"/>
  <line x1="576" y1="320" x2="616" y2="320" stroke="#FFFFFF" stroke-width="2.5"/>

  <!-- Inner doors between reception rooms — also aligned -->
  <line x1="200" y1="240" x2="200" y2="280" stroke="#FFFFFF" stroke-width="2.5"/>
  <line x1="332" y1="240" x2="332" y2="280" stroke="#FFFFFF" stroke-width="2.5"/>
  <line x1="464" y1="240" x2="464" y2="280" stroke="#FFFFFF" stroke-width="2.5"/>
  <line x1="596" y1="240" x2="596" y2="280" stroke="#FFFFFF" stroke-width="2.5"/>

  <!-- Service zone subdivisions -->
  <line x1="220" y1="320" x2="220" y2="450" class="inner"/>
  <line x1="370" y1="320" x2="370" y2="450" class="inner"/>
  <line x1="500" y1="320" x2="500" y2="450" class="inner"/>
  <line x1="630" y1="320" x2="630" y2="450" class="inner"/>

  <!-- Furniture in reception (chairs around tables) -->
  <rect x="100" y="220" width="70" height="40" class="furn"/>
  <rect x="232" y="220" width="80" height="40" class="furn"/>
  <rect x="364" y="220" width="80" height="40" class="furn"/>
  <rect x="496" y="220" width="80" height="40" class="furn"/>
  <rect x="628" y="220" width="80" height="40" class="furn"/>

  <!-- Room labels — enfilade -->
  <text x="135" y="200" class="room" text-anchor="middle">САЛОН</text>
  <text x="266" y="200" class="room" text-anchor="middle">СТОЛОВАЯ</text>
  <text x="398" y="200" class="room" text-anchor="middle">ГАЛЕРЕЯ</text>
  <text x="530" y="200" class="room" text-anchor="middle">КАБИНЕТ</text>
  <text x="662" y="200" class="room" text-anchor="middle">МУЗЫК. КОМНАТА</text>

  <!-- Service labels -->
  <text x="145" y="395" class="room" text-anchor="middle">ХОЛЛ</text>
  <text x="295" y="395" class="room" text-anchor="middle">КУХНЯ</text>
  <text x="435" y="395" class="room" text-anchor="middle">САНУЗЕЛ</text>
  <text x="565" y="395" class="room" text-anchor="middle">СПАЛЬНЯ</text>
  <text x="680" y="395" class="room" text-anchor="middle">ГАРД.</text>

  <!-- North arrow -->
  <g transform="translate(745, 70)">
    <line x1="0" y1="0" x2="0" y2="-26" class="wall"/>
    <polygon points="0,-26 -3,-18 3,-18" fill="#0A0A0A"/>
    <text x="0" y="14" class="meta" text-anchor="middle">N</text>
  </g>

  <!-- Scale bar -->
  <g transform="translate(60, 555)">
    <line x1="0" y1="0" x2="60" y2="0" class="wall"/>
    <line x1="0" y1="-3" x2="0" y2="3" class="wall"/>
    <line x1="20" y1="-3" x2="20" y2="3" class="wall"/>
    <line x1="60" y1="-3" x2="60" y2="3" class="wall"/>
    <text x="0" y="14" class="meta">0</text>
    <text x="20" y="14" class="meta">1</text>
    <text x="56" y="14" class="meta">3 M</text>
  </g>

  <!-- Title block -->
  <g transform="translate(500, 540)">
    <text x="0" y="0" class="meta">02 / КВАРТИРА, ОСТОЖЕНКА</text>
    <text x="0" y="14" class="meta">ПЛАН · 1:150 · АНФИЛАДА</text>
    <text x="0" y="28" class="meta">320 m² · 2023 · STUDIO KUZNETSOV</text>
  </g>
</svg>
