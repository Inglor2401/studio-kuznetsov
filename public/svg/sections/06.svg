<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Квартира, Тверская — продольный разрез">
  <style>
    text { font-family: ui-monospace, 'JetBrains Mono', Menlo, monospace; }
    .room { font-size: 10px; fill: #0A0A0A; letter-spacing: 0.08em; }
    .meta { font-size: 9px; fill: #0A0A0A; letter-spacing: 0.06em; }
    .wall { stroke: #0A0A0A; stroke-width: 1.5; fill: none; }
    .inner { stroke: #0A0A0A; stroke-width: 0.8; fill: none; }
    .furn { stroke: #0A0A0A; stroke-width: 0.5; fill: none; }
    .moulding { stroke: #6B6B6B; stroke-width: 0.4; fill: none; }
  </style>
  <rect width="800" height="600" fill="#FFFFFF"/>

  <!-- Floor & ceiling — high (3.6m) historical apartment -->
  <line x1="80" y1="450" x2="720" y2="450" class="wall"/>
  <line x1="80" y1="160" x2="720" y2="160" class="wall"/>
  <line x1="80" y1="160" x2="80" y2="450" class="wall"/>
  <line x1="720" y1="160" x2="720" y2="450" class="wall"/>

  <!-- Crown moulding — multi-line decorative profile preserved -->
  <line x1="80" y1="170" x2="720" y2="170" class="moulding"/>
  <line x1="80" y1="178" x2="720" y2="178" class="moulding"/>
  <line x1="80" y1="184" x2="720" y2="184" class="moulding"/>
  <line x1="80" y1="190" x2="720" y2="190" class="moulding"/>

  <!-- Ceiling rosette (centered, around chandelier) -->
  <circle cx="400" cy="195" r="20" class="moulding"/>
  <circle cx="400" cy="195" r="14" class="moulding"/>

  <!-- Central chandelier -->
  <line x1="400" y1="195" x2="400" y2="280" class="furn"/>
  <ellipse cx="400" cy="290" rx="28" ry="14" class="furn"/>
  <line x1="380" y1="285" x2="380" y2="305" class="furn"/>
  <line x1="395" y1="285" x2="395" y2="305" class="furn"/>
  <line x1="410" y1="285" x2="410" y2="305" class="furn"/>
  <line x1="425" y1="285" x2="425" y2="305" class="furn"/>

  <!-- Inner walls — 3 reception rooms enfilade in section -->
  <line x1="240" y1="190" x2="240" y2="450" class="inner"/>
  <line x1="540" y1="190" x2="540" y2="450" class="inner"/>

  <!-- Aligned door openings -->
  <line x1="230" y1="450" x2="250" y2="450" stroke="#FFFFFF" stroke-width="2.5"/>
  <line x1="230" y1="350" x2="230" y2="450" class="inner"/>
  <line x1="250" y1="350" x2="250" y2="450" class="inner"/>
  <line x1="230" y1="350" x2="250" y2="350" class="inner"/>
  <!-- Decorative door frame moulding -->
  <line x1="226" y1="350" x2="226" y2="450" class="moulding"/>
  <line x1="254" y1="350" x2="254" y2="450" class="moulding"/>
  <line x1="226" y1="350" x2="254" y2="350" class="moulding"/>

  <line x1="530" y1="450" x2="550" y2="450" stroke="#FFFFFF" stroke-width="2.5"/>
  <line x1="530" y1="350" x2="530" y2="450" class="inner"/>
  <line x1="550" y1="350" x2="550" y2="450" class="inner"/>
  <line x1="530" y1="350" x2="550" y2="350" class="inner"/>
  <line x1="526" y1="350" x2="526" y2="450" class="moulding"/>
  <line x1="554" y1="350" x2="554" y2="450" class="moulding"/>
  <line x1="526" y1="350" x2="554" y2="350" class="moulding"/>

  <!-- Furniture: Wegner sofa, Juhl chairs -->
  <rect x="120" y="410" width="100" height="40" class="furn"/>
  <line x1="120" y1="410" x2="120" y2="380" class="furn"/>
  <line x1="220" y1="410" x2="220" y2="380" class="furn"/>

  <ellipse cx="400" cy="430" rx="50" ry="20" class="furn"/>
  <line x1="350" y1="430" x2="350" y2="400" class="furn"/>
  <line x1="450" y1="430" x2="450" y2="400" class="furn"/>

  <rect x="580" y="410" width="120" height="40" class="furn"/>

  <!-- Floor parquet indication -->
  <line x1="80" y1="445" x2="720" y2="445" class="furn"/>
  <line x1="80" y1="448" x2="720" y2="448" class="furn"/>

  <!-- Person silhouette for scale -->
  <line x1="700" y1="450" x2="700" y2="395" class="furn"/>
  <circle cx="700" cy="390" r="5" class="furn"/>

  <!-- Level labels -->
  <text x="50" y="155" class="meta">+3.60 — ПОТОЛОК</text>
  <text x="50" y="465" class="meta">+0.00 — УР. ПОЛА</text>

  <!-- Annotations -->
  <text x="160" y="320" class="room" text-anchor="middle">САЛОН</text>
  <text x="390" y="320" class="room" text-anchor="middle">СТОЛОВАЯ</text>
  <text x="640" y="320" class="room" text-anchor="middle">КАБИНЕТ</text>
  <text x="400" y="225" class="meta" text-anchor="middle">— ИСТОР. ЛЕПНИНА XIX в. —</text>

  <!-- Scale bar -->
  <g transform="translate(60, 575)">
    <line x1="0" y1="0" x2="60" y2="0" class="wall"/>
    <line x1="0" y1="-3" x2="0" y2="3" class="wall"/>
    <line x1="20" y1="-3" x2="20" y2="3" class="wall"/>
    <line x1="60" y1="-3" x2="60" y2="3" class="wall"/>
    <text x="0" y="14" class="meta">0</text>
    <text x="20" y="14" class="meta">1</text>
    <text x="56" y="14" class="meta">3 M</text>
  </g>

  <!-- Title block -->
  <g transform="translate(500, 560)">
    <text x="0" y="0" class="meta">06 / КВАРТИРА, ТВЕРСКАЯ</text>
    <text x="0" y="14" class="meta">РАЗРЕЗ · 1:100 · АНФИЛАДА + ЛЕПНИНА</text>
    <text x="0" y="28" class="meta">210 m² · 2024 · STUDIO KUZNETSOV</text>
  </g>
</svg>
