<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Пентхаус, Патриаршие — продольный разрез">
  <style>
    text { font-family: ui-monospace, 'JetBrains Mono', Menlo, monospace; }
    .room { font-size: 10px; fill: #0A0A0A; letter-spacing: 0.08em; }
    .meta { font-size: 9px; fill: #0A0A0A; letter-spacing: 0.06em; }
    .wall { stroke: #0A0A0A; stroke-width: 1.5; fill: none; }
    .inner { stroke: #0A0A0A; stroke-width: 0.8; fill: none; }
    .furn { stroke: #0A0A0A; stroke-width: 0.5; fill: none; }
    .ghost { stroke: #BBBBBB; stroke-width: 0.5; fill: none; stroke-dasharray: 3 3; }
    .filled { fill: #0A0A0A; }
  </style>
  <rect width="800" height="600" fill="#FFFFFF"/>

  <!-- Sky/context (existing dореволюционный house outline ghosted) -->
  <line x1="40" y1="180" x2="80" y2="180" class="ghost"/>
  <line x1="720" y1="180" x2="760" y2="180" class="ghost"/>

  <!-- Ground (slab below — top of dореволюционный building) -->
  <line x1="40" y1="500" x2="760" y2="500" class="wall"/>

  <!-- Penthouse cross-section: 2 levels above slab -->
  <!-- Level 01 — lower -->
  <line x1="100" y1="500" x2="100" y2="370" class="wall"/>
  <line x1="700" y1="500" x2="700" y2="370" class="wall"/>
  <!-- Slab between levels -->
  <line x1="100" y1="370" x2="700" y2="370" class="wall"/>
  <line x1="100" y1="378" x2="700" y2="378" class="inner"/>
  <!-- Level 02 — upper -->
  <line x1="100" y1="370" x2="100" y2="220" class="wall"/>
  <line x1="700" y1="370" x2="700" y2="220" class="wall"/>
  <!-- Roof slab -->
  <line x1="100" y1="220" x2="700" y2="220" class="wall"/>
  <line x1="100" y1="212" x2="700" y2="212" class="inner"/>
  <!-- Roof terrace railing -->
  <line x1="120" y1="212" x2="120" y2="190" class="furn"/>
  <line x1="680" y1="212" x2="680" y2="190" class="furn"/>
  <line x1="120" y1="190" x2="680" y2="190" class="furn"/>

  <!-- Internal stair (level 1 to level 2) -->
  <line x1="380" y1="500" x2="380" y2="370" class="inner"/>
  <line x1="460" y1="500" x2="460" y2="370" class="inner"/>
  <line x1="380" y1="500" x2="460" y2="500" class="inner"/>
  <!-- Stair treads -->
  <line x1="380" y1="488" x2="396" y2="488" class="furn"/>
  <line x1="396" y1="488" x2="396" y2="476" class="furn"/>
  <line x1="396" y1="476" x2="412" y2="476" class="furn"/>
  <line x1="412" y1="476" x2="412" y2="464" class="furn"/>
  <line x1="412" y1="464" x2="428" y2="464" class="furn"/>
  <line x1="428" y1="464" x2="428" y2="452" class="furn"/>
  <line x1="428" y1="452" x2="444" y2="452" class="furn"/>
  <line x1="444" y1="452" x2="444" y2="440" class="furn"/>
  <line x1="444" y1="440" x2="460" y2="440" class="furn"/>

  <!-- Library wall — built-in shelves on level 02, full height -->
  <line x1="540" y1="370" x2="540" y2="220" class="inner"/>
  <line x1="690" y1="370" x2="690" y2="220" class="inner"/>
  <line x1="540" y1="240" x2="690" y2="240" class="furn"/>
  <line x1="540" y1="270" x2="690" y2="270" class="furn"/>
  <line x1="540" y1="300" x2="690" y2="300" class="furn"/>
  <line x1="540" y1="330" x2="690" y2="330" class="furn"/>
  <line x1="540" y1="360" x2="690" y2="360" class="furn"/>

  <!-- Fireplace flue (level 1 living, going through to roof) -->
  <rect x="186" y="220" width="20" height="280" class="filled"/>
  <line x1="186" y1="190" x2="186" y2="220" class="furn"/>
  <line x1="206" y1="190" x2="206" y2="220" class="furn"/>

  <!-- Furniture silhouettes — level 1 -->
  <line x1="240" y1="500" x2="240" y2="470" class="furn"/>
  <line x1="240" y1="470" x2="320" y2="470" class="furn"/>
  <line x1="320" y1="470" x2="320" y2="500" class="furn"/>
  <!-- Dining table -->
  <line x1="280" y1="500" x2="280" y2="480" class="furn"/>
  <line x1="280" y1="480" x2="350" y2="480" class="furn"/>
  <line x1="350" y1="480" x2="350" y2="500" class="furn"/>

  <!-- Furniture silhouettes — level 2 (library reading area) -->
  <line x1="120" y1="370" x2="120" y2="345" class="furn"/>
  <line x1="120" y1="345" x2="180" y2="345" class="furn"/>
  <line x1="180" y1="345" x2="180" y2="370" class="furn"/>

  <!-- Person silhouette for scale (level 1) -->
  <line x1="600" y1="500" x2="600" y2="470" class="furn"/>
  <circle cx="600" cy="465" r="4" class="furn"/>

  <!-- Level labels -->
  <text x="50" y="440" class="meta">+0.00 — УР. 01</text>
  <text x="50" y="290" class="meta">+3.20 — УР. 02</text>
  <text x="50" y="200" class="meta">+6.20 — КРОВЛЯ</text>

  <!-- Room labels (in section) -->
  <text x="250" y="425" class="room" text-anchor="middle">ГОСТИНАЯ — КУХНЯ</text>
  <text x="615" y="425" class="room" text-anchor="middle">СПАЛЬНЯ</text>
  <text x="250" y="290" class="room" text-anchor="middle">КАБИНЕТ</text>
  <text x="615" y="290" class="room" text-anchor="middle">БИБЛИОТЕКА</text>
  <text x="400" y="200" class="room" text-anchor="middle">ТЕРРАСА — ВИД НА ПРУД</text>

  <!-- Pre-revolutionary building below (ghost) -->
  <line x1="80" y1="500" x2="80" y2="540" class="ghost"/>
  <line x1="720" y1="500" x2="720" y2="540" class="ghost"/>
  <text x="400" y="525" class="meta" text-anchor="middle">— ДОРЕВОЛЮЦИОННОЕ ЗДАНИЕ —</text>

  <!-- Scale bar -->
  <g transform="translate(60, 575)">
    <line x1="0" y1="0" x2="80" y2="0" class="wall"/>
    <line x1="0" y1="-3" x2="0" y2="3" class="wall"/>
    <line x1="32" y1="-3" x2="32" y2="3" class="wall"/>
    <line x1="80" y1="-3" x2="80" y2="3" class="wall"/>
    <text x="0" y="14" class="meta">0</text>
    <text x="32" y="14" class="meta">1</text>
    <text x="76" y="14" class="meta">3 M</text>
  </g>

  <!-- Title block -->
  <g transform="translate(500, 560)">
    <text x="0" y="0" class="meta">01 / ПЕНТХАУС, ПАТРИАРШИЕ</text>
    <text x="0" y="14" class="meta">ПРОДОЛЬНЫЙ РАЗРЕЗ · 1:100 · А-А</text>
    <text x="0" y="28" class="meta">240 m² · 2024 · STUDIO KUZNETSOV</text>
  </g>
</svg>
