<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Квартира, Остоженка — продольный разрез">
  <style>
    text { font-family: ui-monospace, 'JetBrains Mono', Menlo, monospace; }
    .room { font-size: 10px; fill: #0A0A0A; letter-spacing: 0.08em; }
    .meta { font-size: 9px; fill: #0A0A0A; letter-spacing: 0.06em; }
    .wall { stroke: #0A0A0A; stroke-width: 1.5; fill: none; }
    .inner { stroke: #0A0A0A; stroke-width: 0.8; fill: none; }
    .furn { stroke: #0A0A0A; stroke-width: 0.5; fill: none; }
  </style>
  <rect width="800" height="600" fill="#FFFFFF"/>

  <!-- Floor & ceiling -->
  <line x1="40" y1="450" x2="760" y2="450" class="wall"/>
  <line x1="40" y1="200" x2="760" y2="200" class="wall"/>

  <!-- Outer walls -->
  <line x1="40" y1="200" x2="40" y2="450" class="wall"/>
  <line x1="760" y1="200" x2="760" y2="450" class="wall"/>

  <!-- Inner walls — 5 reception rooms in enfilade with aligned doors -->
  <line x1="180" y1="200" x2="180" y2="450" class="inner"/>
  <line x1="320" y1="200" x2="320" y2="450" class="inner"/>
  <line x1="460" y1="200" x2="460" y2="450" class="inner"/>
  <line x1="600" y1="200" x2="600" y2="450" class="inner"/>

  <!-- Aligned door openings (enfilade signature visible in section) -->
  <line x1="170" y1="450" x2="190" y2="450" stroke="#FFFFFF" stroke-width="2.5"/>
  <line x1="170" y1="350" x2="170" y2="450" class="inner"/>
  <line x1="190" y1="350" x2="190" y2="450" class="inner"/>
  <line x1="170" y1="350" x2="190" y2="350" class="inner"/>

  <line x1="310" y1="450" x2="330" y2="450" stroke="#FFFFFF" stroke-width="2.5"/>
  <line x1="310" y1="350" x2="310" y2="450" class="inner"/>
  <line x1="330" y1="350" x2="330" y2="450" class="inner"/>
  <line x1="310" y1="350" x2="330" y2="350" class="inner"/>

  <line x1="450" y1="450" x2="470" y2="450" stroke="#FFFFFF" stroke-width="2.5"/>
  <line x1="450" y1="350" x2="450" y2="450" class="inner"/>
  <line x1="470" y1="350" x2="470" y2="450" class="inner"/>
  <line x1="450" y1="350" x2="470" y2="350" class="inner"/>

  <line x1="590" y1="450" x2="610" y2="450" stroke="#FFFFFF" stroke-width="2.5"/>
  <line x1="590" y1="350" x2="590" y2="450" class="inner"/>
  <line x1="610" y1="350" x2="610" y2="450" class="inner"/>
  <line x1="590" y1="350" x2="610" y2="350" class="inner"/>

  <!-- Floor pattern indication -->
  <line x1="40" y1="445" x2="760" y2="445" class="furn"/>

  <!-- Crown moulding (continuous along ceiling) -->
  <line x1="40" y1="210" x2="760" y2="210" class="furn"/>
  <line x1="40" y1="218" x2="760" y2="218" class="furn"/>

  <!-- Furniture silhouettes — chairs/tables in each room -->
  <rect x="80" y="420" width="80" height="30" class="furn"/>
  <rect x="220" y="420" width="80" height="30" class="furn"/>
  <rect x="360" y="420" width="80" height="30" class="furn"/>
  <ellipse cx="520" cy="430" rx="40" ry="15" class="furn"/>
  <rect x="640" y="420" width="80" height="30" class="furn"/>

  <!-- Pendant lamps (above each table, ceiling mounted) -->
  <line x1="120" y1="200" x2="120" y2="240" class="furn"/>
  <circle cx="120" cy="248" r="6" class="furn"/>
  <line x1="260" y1="200" x2="260" y2="240" class="furn"/>
  <circle cx="260" cy="248" r="6" class="furn"/>
  <line x1="400" y1="200" x2="400" y2="240" class="furn"/>
  <circle cx="400" cy="248" r="6" class="furn"/>
  <line x1="520" y1="200" x2="520" y2="240" class="furn"/>
  <circle cx="520" cy="248" r="6" class="furn"/>
  <line x1="680" y1="200" x2="680" y2="240" class="furn"/>
  <circle cx="680" cy="248" r="6" class="furn"/>

  <!-- Person silhouette for scale -->
  <line x1="700" y1="450" x2="700" y2="395" class="furn"/>
  <circle cx="700" cy="390" r="5" class="furn"/>

  <!-- Level labels -->
  <text x="50" y="195" class="meta">+3.20 — ПОТОЛОК</text>
  <text x="50" y="465" class="meta">+0.00 — УР. ПОЛА</text>

  <!-- Room labels — visible enfilade -->
  <text x="110" y="320" class="room" text-anchor="middle">САЛОН</text>
  <text x="250" y="320" class="room" text-anchor="middle">СТОЛОВАЯ</text>
  <text x="390" y="320" class="room" text-anchor="middle">ГАЛЕРЕЯ</text>
  <text x="530" y="320" class="room" text-anchor="middle">КАБИНЕТ</text>
  <text x="680" y="320" class="room" text-anchor="middle">МУЗЫК.</text>

  <!-- Enfilade indication line -->
  <line x1="60" y1="160" x2="740" y2="160" class="furn" stroke-dasharray="2 4"/>
  <text x="400" y="155" class="meta" text-anchor="middle">— АНФИЛАДА · 5 ВЫРАВНЕННЫХ ПРОЁМОВ —</text>

  <!-- Scale bar -->
  <g transform="translate(60, 575)">
    <line x1="0" y1="0" x2="60" y2="0" class="wall"/>
    <line x1="0" y1="-3" x2="0" y2="3" class="wall"/>
    <line x1="20" y1="-3" x2="20" y2="3" class="wall"/>
    <line x1="60" y1="-3" x2="60" y2="3" class="wall"/>
    <text x="0" y="14" class="meta">0</text>
    <text x="20" y="14" class="meta">1</text>
    <text x="56" y="14" class="meta">3 M</text>
  </g>

  <!-- Title block -->
  <g transform="translate(500, 560)">
    <text x="0" y="0" class="meta">02 / КВАРТИРА, ОСТОЖЕНКА</text>
    <text x="0" y="14" class="meta">РАЗРЕЗ · 1:150 · ВИД АНФИЛАДЫ</text>
    <text x="0" y="28" class="meta">320 m² · 2023 · STUDIO KUZNETSOV</text>
  </g>
</svg>
