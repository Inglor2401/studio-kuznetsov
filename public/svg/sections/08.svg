<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Дача, Николина Гора — продольный разрез">
  <style>
    text { font-family: ui-monospace, 'JetBrains Mono', Menlo, monospace; }
    .room { font-size: 10px; fill: #0A0A0A; letter-spacing: 0.08em; }
    .meta { font-size: 9px; fill: #0A0A0A; letter-spacing: 0.06em; }
    .wall { stroke: #0A0A0A; stroke-width: 1.5; fill: none; }
    .inner { stroke: #0A0A0A; stroke-width: 0.8; fill: none; }
    .furn { stroke: #0A0A0A; stroke-width: 0.5; fill: none; }
    .ghost { stroke: #BBBBBB; stroke-width: 0.5; fill: none; stroke-dasharray: 3 3; }
  </style>
  <rect width="800" height="600" fill="#FFFFFF"/>

  <!-- Ground line -->
  <line x1="20" y1="430" x2="780" y2="430" class="wall"/>
  <line x1="40" y1="435" x2="30" y2="445" class="furn"/>
  <line x1="120" y1="435" x2="110" y2="445" class="furn"/>
  <line x1="200" y1="435" x2="190" y2="445" class="furn"/>
  <line x1="300" y1="435" x2="290" y2="445" class="furn"/>
  <line x1="400" y1="435" x2="390" y2="445" class="furn"/>
  <line x1="500" y1="435" x2="490" y2="445" class="furn"/>
  <line x1="600" y1="435" x2="590" y2="445" class="furn"/>
  <line x1="700" y1="435" x2="690" y2="445" class="furn"/>

  <!-- Traditional dacha cross-section with pitched roof -->
  <!-- Main body floor plate -->
  <line x1="180" y1="430" x2="180" y2="290" class="wall"/>
  <line x1="620" y1="430" x2="620" y2="290" class="wall"/>

  <!-- Pitched roof — symmetrical -->
  <line x1="160" y1="290" x2="400" y2="160" class="wall"/>
  <line x1="400" y1="160" x2="640" y2="290" class="wall"/>
  <line x1="640" y1="290" x2="160" y2="290" class="wall"/>

  <!-- Roof eaves (slight overhang) -->
  <line x1="160" y1="290" x2="180" y2="290" class="wall"/>
  <line x1="640" y1="290" x2="620" y2="290" class="wall"/>

  <!-- Roof inner line (rafter indication) -->
  <line x1="180" y1="285" x2="400" y2="170" class="inner"/>
  <line x1="400" y1="170" x2="620" y2="285" class="inner"/>

  <!-- Attic floor (small) -->
  <line x1="280" y1="290" x2="520" y2="290" class="inner"/>

  <!-- Internal walls -->
  <line x1="280" y1="430" x2="280" y2="290" class="inner"/>
  <line x1="380" y1="430" x2="380" y2="290" class="inner"/>
  <line x1="500" y1="430" x2="500" y2="290" class="inner"/>

  <!-- Veranda (south side) — open structure -->
  <line x1="620" y1="430" x2="730" y2="430" class="furn"/>
  <line x1="730" y1="430" x2="730" y2="350" class="furn"/>
  <line x1="730" y1="350" x2="620" y2="290" class="furn"/>
  <!-- Veranda columns -->
  <line x1="660" y1="430" x2="660" y2="370" class="furn"/>
  <line x1="700" y1="430" x2="700" y2="362" class="furn"/>

  <!-- Terrace on west (left side) -->
  <line x1="180" y1="430" x2="60" y2="430" class="furn"/>
  <line x1="60" y1="430" x2="60" y2="410" class="furn"/>
  <line x1="60" y1="410" x2="180" y2="410" class="furn"/>
  <line x1="60" y1="425" x2="180" y2="425" class="furn"/>

  <!-- Furniture inside -->
  <ellipse cx="430" cy="410" rx="40" ry="15" class="furn"/>
  <rect x="200" y="385" width="60" height="40" class="furn"/>
  <rect x="535" y="385" width="60" height="40" class="furn"/>

  <!-- Veranda chairs -->
  <rect x="640" y="395" width="20" height="35" class="furn"/>
  <rect x="700" y="385" width="20" height="45" class="furn"/>

  <!-- Trees backdrop -->
  <circle cx="50" cy="280" r="20" class="ghost"/>
  <line x1="50" y1="280" x2="50" y2="320" class="ghost"/>
  <circle cx="780" cy="290" r="22" class="ghost"/>
  <line x1="780" y1="290" x2="780" y2="335" class="ghost"/>
  <circle cx="100" cy="350" r="14" class="ghost"/>
  <line x1="100" y1="350" x2="100" y2="380" class="ghost"/>

  <!-- Person silhouette for scale -->
  <line x1="450" y1="430" x2="450" y2="380" class="furn"/>
  <circle cx="450" cy="375" r="5" class="furn"/>

  <!-- Roof ridge marker -->
  <text x="400" y="155" class="meta" text-anchor="middle">+5.00 — КОНЁК</text>

  <!-- Level labels -->
  <text x="50" y="285" class="meta">+2.40 — КАРНИЗ</text>
  <text x="50" y="425" class="meta">+0.00</text>

  <!-- Annotations -->
  <text x="230" y="370" class="room" text-anchor="middle">СПАЛЬНЯ</text>
  <text x="335" y="370" class="room" text-anchor="middle">КУХНЯ</text>
  <text x="445" y="370" class="room" text-anchor="middle">ГОСТИНАЯ</text>
  <text x="565" y="370" class="room" text-anchor="middle">СПАЛЬНЯ</text>
  <text x="675" y="380" class="room" text-anchor="middle">ВЕРАНДА</text>
  <text x="120" y="395" class="room" text-anchor="middle">ТЕРРАСА</text>
  <text x="400" y="240" class="room" text-anchor="middle">ЧЕРДАК</text>

  <!-- Restoration note -->
  <text x="40" y="120" class="meta">— СОХРАНЁННЫЙ КОНТУР 1948 —</text>

  <!-- Scale bar -->
  <g transform="translate(60, 575)">
    <line x1="0" y1="0" x2="80" y2="0" class="wall"/>
    <line x1="0" y1="-3" x2="0" y2="3" class="wall"/>
    <line x1="32" y1="-3" x2="32" y2="3" class="wall"/>
    <line x1="80" y1="-3" x2="80" y2="3" class="wall"/>
    <text x="0" y="14" class="meta">0</text>
    <text x="32" y="14" class="meta">2</text>
    <text x="76" y="14" class="meta">5 M</text>
  </g>

  <!-- Title block -->
  <g transform="translate(500, 560)">
    <text x="0" y="0" class="meta">08 / ДАЧА, НИКОЛИНА ГОРА</text>
    <text x="0" y="14" class="meta">ПРОДОЛЬНЫЙ РАЗРЕЗ · 1:150</text>
    <text x="0" y="28" class="meta">380 m² · 2022 · STUDIO KUZNETSOV</text>
  </g>
</svg>
