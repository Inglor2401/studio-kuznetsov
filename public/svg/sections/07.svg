<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Дом, Рублёвка — поперечный разрез">
  <style>
    text { font-family: ui-monospace, 'JetBrains Mono', Menlo, monospace; }
    .room { font-size: 10px; fill: #0A0A0A; letter-spacing: 0.08em; }
    .meta { font-size: 9px; fill: #0A0A0A; letter-spacing: 0.06em; }
    .wall { stroke: #0A0A0A; stroke-width: 1.5; fill: none; }
    .inner { stroke: #0A0A0A; stroke-width: 0.8; fill: none; }
    .furn { stroke: #0A0A0A; stroke-width: 0.5; fill: none; }
    .ghost { stroke: #BBBBBB; stroke-width: 0.5; fill: none; stroke-dasharray: 3 3; }
    .glass { stroke: #0A0A0A; stroke-width: 0.6; fill: none; }
  </style>
  <rect width="800" height="600" fill="#FFFFFF"/>

  <!-- Ground line -->
  <line x1="20" y1="430" x2="780" y2="430" class="wall"/>
  <line x1="40" y1="435" x2="30" y2="445" class="furn"/>
  <line x1="120" y1="435" x2="110" y2="445" class="furn"/>
  <line x1="200" y1="435" x2="190" y2="445" class="furn"/>
  <line x1="600" y1="435" x2="590" y2="445" class="furn"/>
  <line x1="700" y1="435" x2="690" y2="445" class="furn"/>
  <line x1="760" y1="435" x2="750" y2="445" class="furn"/>

  <!-- Single-story house cross-section -->
  <!-- Solid north wall (left in section) -->
  <line x1="260" y1="430" x2="260" y2="240" class="wall"/>
  <!-- Flat low-pitched roof -->
  <line x1="240" y1="240" x2="600" y2="240" class="wall"/>
  <line x1="240" y1="232" x2="600" y2="232" class="inner"/>
  <!-- Glass wall on south (right) — full-height glazing -->
  <line x1="600" y1="240" x2="600" y2="430" class="glass"/>
  <line x1="604" y1="240" x2="604" y2="430" class="glass"/>
  <!-- Glazing horizontal mullions -->
  <line x1="600" y1="280" x2="604" y2="280" class="glass"/>
  <line x1="600" y1="320" x2="604" y2="320" class="glass"/>
  <line x1="600" y1="360" x2="604" y2="360" class="glass"/>
  <line x1="600" y1="400" x2="604" y2="400" class="glass"/>

  <!-- Foundation -->
  <line x1="240" y1="430" x2="600" y2="430" class="wall"/>

  <!-- Internal walls (bedroom partition shown) -->
  <line x1="380" y1="430" x2="380" y2="240" class="inner"/>
  <line x1="500" y1="430" x2="500" y2="240" class="inner"/>

  <!-- Ceiling — wood lined -->
  <line x1="240" y1="248" x2="600" y2="248" class="furn"/>
  <line x1="280" y1="240" x2="280" y2="248" class="furn"/>
  <line x1="320" y1="240" x2="320" y2="248" class="furn"/>
  <line x1="360" y1="240" x2="360" y2="248" class="furn"/>
  <line x1="400" y1="240" x2="400" y2="248" class="furn"/>
  <line x1="440" y1="240" x2="440" y2="248" class="furn"/>
  <line x1="480" y1="240" x2="480" y2="248" class="furn"/>
  <line x1="520" y1="240" x2="520" y2="248" class="furn"/>
  <line x1="560" y1="240" x2="560" y2="248" class="furn"/>

  <!-- Furniture: bedroom -->
  <rect x="280" y="380" width="80" height="50" class="furn"/>
  <!-- Master bed -->
  <rect x="400" y="380" width="80" height="50" class="furn"/>
  <!-- Living seating -->
  <rect x="520" y="395" width="60" height="35" class="furn"/>

  <!-- Forest backdrop (south side, viewed through glass) -->
  <circle cx="660" cy="340" r="25" class="ghost"/>
  <line x1="660" y1="340" x2="660" y2="380" class="ghost"/>
  <circle cx="720" cy="350" r="20" class="ghost"/>
  <line x1="720" y1="350" x2="720" y2="385" class="ghost"/>
  <circle cx="760" cy="370" r="15" class="ghost"/>
  <line x1="760" y1="370" x2="760" y2="395" class="ghost"/>

  <!-- Forest backdrop (north too) -->
  <circle cx="50" cy="340" r="22" class="ghost"/>
  <line x1="50" y1="340" x2="50" y2="380" class="ghost"/>
  <circle cx="120" cy="350" r="20" class="ghost"/>
  <line x1="120" y1="350" x2="120" y2="385" class="ghost"/>

  <!-- Person silhouette (scale, near glass) -->
  <line x1="560" y1="430" x2="560" y2="378" class="furn"/>
  <circle cx="560" cy="372" r="5" class="furn"/>

  <!-- Level labels -->
  <text x="50" y="240" class="meta">+3.20 — ПОТОЛОК</text>
  <text x="50" y="425" class="meta">+0.00 — УР. ПОЛА</text>

  <!-- Annotations -->
  <text x="320" y="340" class="room" text-anchor="middle">СПАЛЬНЯ</text>
  <text x="440" y="340" class="room" text-anchor="middle">САНУЗЕЛ</text>
  <text x="555" y="340" class="room" text-anchor="middle">ОБЩАЯ</text>
  <text x="700" y="320" class="meta" text-anchor="middle">↑ ВИД НА ЛЕС</text>
  <text x="610" y="220" class="meta" text-anchor="start">ПАНОРАМНОЕ ОСТЕКЛЕНИЕ — ПОЛ ДО ПОТОЛКА</text>

  <!-- Scale bar -->
  <g transform="translate(60, 575)">
    <line x1="0" y1="0" x2="80" y2="0" class="wall"/>
    <line x1="0" y1="-3" x2="0" y2="3" class="wall"/>
    <line x1="32" y1="-3" x2="32" y2="3" class="wall"/>
    <line x1="80" y1="-3" x2="80" y2="3" class="wall"/>
    <text x="0" y="14" class="meta">0</text>
    <text x="32" y="14" class="meta">2</text>
    <text x="76" y="14" class="meta">5 M</text>
  </g>

  <!-- Title block -->
  <g transform="translate(500, 560)">
    <text x="0" y="0" class="meta">07 / ДОМ, РУБЛЁВКА</text>
    <text x="0" y="14" class="meta">ПОПЕРЕЧНЫЙ РАЗРЕЗ · 1:200 · С-С</text>
    <text x="0" y="28" class="meta">650 m² · 2023 · STUDIO KUZNETSOV</text>
  </g>
</svg>
